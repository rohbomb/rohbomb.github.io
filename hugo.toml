baseURL = "https://rohbomb.github.io/"
title = "TIKKLES | AI | Tech | Life Insights"
theme = "PaperMod"

# Multilingual Settings
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
buildExpired = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    contentDir = "content/en"
    weight = 1
    [languages.en.params]
      title = "TIKKLES | Global Tech Insights"
      description = "Global tech news curation for the digital era."
    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/post/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About Us"
      url = "/about/"
      weight = 30

  [languages.ko]
    languageName = "한국어"
    languageCode = "ko-kr"
    contentDir = "content/ko"
    weight = 2
    [languages.ko.params]
      title = "TIKKLES | 한국 IT 인사이트"
      description = "Analyst Bear의 뉴스 큐레이션과 한국 시장 선점용 테크 블로그"
    [[languages.ko.menu.main]]
      identifier = "posts"
      name = "포스트"
      url = "/ko/post/"
      weight = 10
    [[languages.ko.menu.main]]
      identifier = "tags"
      name = "태그"
      url = "/ko/tags/"
      weight = 20
    [[languages.ko.menu.main]]
      identifier = "about"
      name = "소개"
      url = "/ko/about/"
      weight = 30

[params]
  env = "production"
  author = "Analyst Bear"
  DateFormat = "2006-01-02 15:04"
  defaultTheme = "dark"
  disableThemeToggle = true
  google_analytics = "G-T0TJ2VHYF9"
  
  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  copyright = "© 2026 TIKKLES (rohbomb.github.io). All rights reserved. Unauthorized reproduction, distribution, or use of this content — including AI/ML model training, scraping, or dataset compilation — is strictly prohibited without prior written consent."
