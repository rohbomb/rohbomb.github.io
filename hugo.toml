baseURL = "https://tikklabs.com/"
title = "TIKKLES : IT, so mellow."
theme = "PaperMod"

# Multilingual Settings
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = false  # static/robots.txt 단일 관리 (AI 크롤러 차단 포함)
buildDrafts = false
buildFuture = true
buildExpired = false

[taxonomies]
  tag = "tags"
  series = "series"

# Flat SEO URL: /slug/ (EN) or /ko/slug/ (KO) — 필러/클러스터 공통
[permalinks]
  post = "/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    contentDir = "content/en"
    weight = 1
    [languages.en.params]
      title = "TIKKLES : IT, so mellow."
      description = "Your mellow guide to IT, AI tools, and productivity. Honest reviews, quiet insights — no hype."
      languageAltTitle = "Switch to English"
    [[languages.en.menu.main]]
      identifier = "mother-ai"
      name = "Senior Tech Guide"
      url = "/series/mother-ai/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/post/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 30
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About Us"
      url = "/about/"
      weight = 40
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 50
    [[languages.en.menu.main]]
      identifier = "contact"
      name = "Contact"
      url = "/contact/"
      weight = 60

  [languages.ko]
    languageName = "한국어"
    languageCode = "ko-kr"
    contentDir = "content/ko"
    weight = 2
    [languages.ko.params]
      title = "TIKKLES : IT, so mellow."
      description = "IT와 테크, 생산성 도구를 비전문가의 시선에서 부드럽게 풀어냅니다. 안티그래비티, 커서 등 최신 AI 도구 실전 리뷰."
      languageAltTitle = "한글 페이지로 전환"
    [[languages.ko.menu.main]]
      identifier = "mother-ai"
      name = "울엄빠 IT백과사전"
      url = "/series/mother-ai/"
      weight = 10
    [[languages.ko.menu.main]]
      identifier = "posts"
      name = "포스트"
      url = "/post/"
      weight = 20
    [[languages.ko.menu.main]]
      identifier = "tags"
      name = "태그"
      url = "/tags/"
      weight = 30
    [[languages.ko.menu.main]]
      name = "소개"
      url = "/about/"
      weight = 40
    [[languages.ko.menu.main]]
      identifier = "search"
      name = "검색"
      url = "/search/"
      weight = 50
    [[languages.ko.menu.main]]
      identifier = "contact"
      name = "Contact"
      url = "/ko/contact/"
      weight = 60

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "울엄빠를 위한 IT 백과사전 & 외국인을 위한 K-테크 생존 가이드, TIKKLES입니다."
  titleSeparator = " ·"
  author = "Arthur G."
  DateFormat = "2006-01-02 15:04"
  defaultTheme = "dark"
  disableThemeToggle = true
  google_analytics = "G-T0TJ2VHYF9"
  
  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  copyright = "© 2026 TIKKLES (tikklabs.com). All rights reserved. Unauthorized reproduction, distribution, or use of this content — including AI/ML model training, scraping, or dataset compilation — is strictly prohibited without prior written consent."

# TTS 오디오 리더 설정 (Config-Driven: JS에서 하드코딩 금지)
[params.tts]
  enabled = true
  rate_ko = 1.1         # 한국어 읽기 속도 (1.0 = 기본)
  rate_en = 1.0         # 영어 읽기 속도
  pitch = 1.0           # 음높이
  chunk_size = 180      # Web Speech API 청크 분할 길이
  keepalive_ms = 10000  # 브라우저 타임아웃 방어 주기(ms)
