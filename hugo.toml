baseURL = "https://rohbomb.github.io/"
# GitHub Actions Build Trigger
languageCode = "ko-kr"
title = "TIKKLES | AI | Tech | Life Insights"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = true # Bot(KST) vs Server(UTC) Timezone Issue Fix
buildExpired = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  env = "production"
  title = "TIKKLES | AI, Tech & Life Insights"
  description = "Analyst Bear의 뉴스 큐레이션과 대장의 IT/라이프 기록"
  keywords = ["Blog", "Portfolio", "PaperMod"]
  author = "Analyst Bear"
  # images = ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat = "2006-01-02 15:04"
  defaultTheme = "dark" # dark, light, trigger
  disableThemeToggle = true
  googleAnalytics = "G-T0TJ2VHYF9" # G-XXXXXXXXXX 형태 (대장이 발급 후 입력)
  adsensePublisherId = "" # ca-pub-XXXXXXXXXXXXXXXX 형태 (대장이 발급 후 입력)

  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowRelatedContent = true

  [params.profileMode]
    enabled = false
    title = "TIKKLES | AI, Tech & Life Insights"
    subtitle = "Analyst Bear의 뉴스 큐레이션과 대장의 IT/라이프 기록"
    imageUrl = "<link or path of image for opengraph, twitter-cards>"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "my image"
    buttons = [
      { name = "Posts", url = "posts" },
      { name = "Tags", url = "tags" }
    ]

  [[params.socialIcons]]
    name = "Github"
    url = "https://github.com/rohbomb"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About Us"
    url = "/about/"
    weight = 30
