{{- if not hugo.IsServer -}}
{{- if site.Params.google_analytics -}}
<!-- Google Analytics 4 (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.Params.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', '{{ site.Params.google_analytics }}');
</script>
{{- end -}}

{{- if .Site.Params.adsensePublisherId -}}
<script async
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsensePublisherId }}"
  crossorigin="anonymous"></script>
{{- end -}}
{{- end -}}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title }},
  "image": [
    {{ if .Params.cover.image }}
      {{ .Params.cover.image | absURL }}
    {{ else }}
      {{ site.Params.profileMode.imageUrl | absURL }}
    {{ end }}
   ],
  "datePublished": {{ .PublishDate.Format "2006-01-02T15:04:05Z0700" }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z0700" }},
  "author": {
    "@type": "Person",
    "name": {{ .Params.author | default site.Params.author }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title }},
    "logo": {
      "@type": "ImageObject",
      "url": {{ site.Params.assets.favicon | default "favicon.ico" | absURL }}
    }
  },
  "description": {{ .Summary | plainify }}
}
</script>
{{ end }}
