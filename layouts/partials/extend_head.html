<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">
<!-- ============================================================
     🚫 AI 크롤러 차단 & 저작권 보호 메타 태그
     법적 효력: robots meta는 OpenAI/Anthropic/Google AI 정책상 준수 의무
     ============================================================ -->
<!-- AI 학습 데이터 수집 차단 (Web AI Initiative 표준) -->
<meta name="robots" content="noai, noimageai">
<!-- 개별 AI 봇 차단 지시 -->
<meta name="googlebot" content="noai">
<meta name="GPTBot" content="noindex, nofollow">
<meta name="anthropic-ai" content="noindex, nofollow">
<meta name="CCBot" content="noindex, nofollow">
<meta name="Google-Extended" content="noindex, nofollow">
<!-- 저작권 명시 (국제 저작권법 Berne Convention 적용) -->
<meta name="copyright" content="© 2026 TIKKLES. All rights reserved. AI training use prohibited.">
<meta name="rights" content="© 2026 TIKKLES (rohbomb.github.io). Unauthorized AI/ML training, scraping or data compilation strictly prohibited.">

<!-- 파비콘 (임시 SVG — 정식 로고 전까지) -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.svg">


{{- if not hugo.IsServer -}}

<script async src="https://www.googletagmanager.com/gtag/js?id=G-T0TJ2VHYF9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-T0TJ2VHYF9');
</script>

{{- if .Site.Params.adsensePublisherId -}}
<script async
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsensePublisherId }}"
  crossorigin="anonymous"></script>
{{- end -}}
{{- end -}}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title }},
  "image": [
    {{ if .Params.cover.image }}
      {{ .Params.cover.image | absURL }}
    {{ else }}
      {{ site.Params.profileMode.imageUrl | absURL }}
    {{ end }}
   ],
  "datePublished": {{ .PublishDate.Format "2006-01-02T15:04:05Z0700" }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z0700" }},
  "author": {
    "@type": "Person",
    "name": {{ .Params.author | default site.Params.author }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title }},
    "logo": {
      "@type": "ImageObject",
      "url": {{ site.Params.assets.favicon | default "favicon.ico" | absURL }}
    }
  },
  "description": {{ .Summary | plainify }}
}
</script>
{{ end }}

<!-- ============================================================
     🇰🇷 한국어 접속자 안내 토스트 (SEO 안전)
     ============================================================ -->
{{ if .IsHome }}
<style>
  #kr-toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--bg-dark-block, #1A1A1A);
    color: var(--text-main, #F5F0E8);
    border: 2px solid var(--point-gold, #F5A623);
    padding: 16px 24px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    z-index: 9999;
    font-family: var(--primary-font, sans-serif);
    display: none;
    align-items: center;
    gap: 20px;
    animation: slideUpToast 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUpToast { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #kr-toast p { margin: 0; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
  .toast-btns { display: flex; gap: 8px; }
  .toast-btn { 
    padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 700; border: none; transition: 0.2s;
  }
  .toast-go { background: var(--point-gold, #F5A623); color: #fff; text-decoration: none; }
  .toast-go:hover { opacity: 0.9; }
  .toast-close { background: rgba(255,255,255,0.08); color: var(--text-muted, #9E9E9E); }
  .toast-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
  @media (max-width: 600px) {
    #kr-toast { bottom: 20px; right: 20px; left: 20px; flex-direction: column; text-align: center; gap: 12px; }
    .toast-btns { width: 100%; }
    .toast-btn { flex: 1; text-align: center; }
  }
</style>
<div id="kr-toast">
  <p>🇰🇷 한국어로 보시겠어요?</p>
  <div class="toast-btns">
    <a href="/ko/" class="toast-btn toast-go">이동할게요</a>
    <button id="kr-toast-close" class="toast-btn toast-close">닫기</button>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.location.pathname !== '/') return;
    var userLang = navigator.language || navigator.userLanguage;
    if (userLang.includes('ko') && !sessionStorage.getItem('krToastClosed')) {
      var toast = document.getElementById('kr-toast');
      var closeBtn = document.getElementById('kr-toast-close');
      if(toast && closeBtn) {
        toast.style.display = 'flex';
        closeBtn.addEventListener('click', function() {
          toast.style.display = 'none';
          sessionStorage.setItem('krToastClosed', 'true');
        });
      }
    }
  });
</script>
{{ end }}
